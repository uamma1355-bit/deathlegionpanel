name: Self-Heal

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  selfheal:
    name: Heal cluster (5 Daytona + 5 E2B)
    runs-on: ubuntu-latest
    if: github.repository != 'pterodactyl/panel'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2B SDK
        run: npm install e2b

      - name: Run permanent fix + cluster self-heal
        env:
          DAYTONA_TOKEN: ${{ secrets.DAYTONA_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          # Run permanent fix (fixes start_all.sh, rc.local, watchers, E2B storage)
          python3 scripts/permanent_fix_v2.py 2>&1 | tee selfheal.log
          echo "---" >> selfheal.log
          # Also run cluster manager for multi-node healing
          python3 scripts/cluster_manager.py 2>&1 | tee -a selfheal.log || true
          echo "## Cluster Self-Heal Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -40 selfheal.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
