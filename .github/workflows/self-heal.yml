# Unified Self-Heal — keeps the single Pterodactyl panel on Daytona healthy.
# No more Vercel split. The panel is served directly from the Daytona sandbox
# via its public URL.
#
# Required GitHub repo secrets:
#   DAYTONA_TOKEN  - Daytona API token
#
# Optional (only used if sandbox needs full rebuild):
#   GH_TOKEN       - GitHub PAT (for MySQL backup commits)
#   MYSQL_ROOT_PW  - MySQL root password
#   MYSQL_APP_PW   - MySQL app password
#   ADMIN_USERNAME - Admin username (default: admin)
#   ADMIN_PASSWORD - Admin password

name: Self-Heal

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  selfheal:
    name: Keep unified panel healthy
    runs-on: ubuntu-latest
    if: github.repository != 'pterodactyl/panel'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run unified self-heal
        env:
          DAYTONA_TOKEN: ${{ secrets.DAYTONA_TOKEN }}
        run: |
          python3 scripts/selfheal_unified.py 2>&1 | tee selfheal.log
          echo "## Unified Panel Self-Heal" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat selfheal.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
