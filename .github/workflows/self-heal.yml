name: Self-Heal

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  selfheal:
    name: Heal all sandboxes
    runs-on: ubuntu-latest
    if: github.repository != 'pterodactyl/panel'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2B SDK
        run: npm install e2b

      - name: Run unified self-heal
        env:
          DAYTONA_TOKEN: ${{ secrets.DAYTONA_TOKEN }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          python3 scripts/selfheal_unified.py 2>&1 | tee selfheal.log
          echo "## Self-Heal Result" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 selfheal.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
