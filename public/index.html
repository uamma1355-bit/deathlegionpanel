<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeathLegion Panel</title>
  <meta name="description" content="Pterodactyl Panel — unified game server management" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 640px;
      width: 90%;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #bc6e3c 0%, #e89060 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: #888; margin-bottom: 2.5rem; font-size: 0.95rem; }
    .spinner {
      width: 50px; height: 50px;
      border: 3px solid #1a4731;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    .healing .spinner {
      width: 60px; height: 60px;
      border: 4px solid #3a2a0e;
      border-top-color: #f59e0b;
      border-right-color: #f59e0b;
    }
    .healing .status-text { color: #f59e0b; }
    .healing .pulse { animation: pulse 2s ease-in-out infinite; }
    .healthy .status-text { color: #22c55e; }
    .error .status-text { color: #ef4444; }
    .status-text { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
    .msg { color: #ccc; margin-bottom: 1.5rem; line-height: 1.6; }
    .countdown { color: #888; font-size: 0.9rem; margin: 1rem 0; }
    .countdown strong { color: #f59e0b; }
    .steps { display: flex; flex-direction: column; gap: 0.5rem; margin: 1.5rem 0; text-align: left; }
    .step {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 0.9rem; color: #aaa;
    }
    .step .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .step.active .dot { background: #f59e0b; animation: blink 1s ease-in-out infinite; }
    .step.done .dot { background: #22c55e; }
    .step.done { color: #666; }
    .manual-link {
      display: inline-block; margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #bc6e3c; color: #fff;
      text-decoration: none; border-radius: 8px;
      font-weight: 500; transition: background 0.2s;
    }
    .manual-link:hover { background: #d97f4a; }
    .meta {
      margin-top: 2rem; font-size: 0.75rem; color: #555;
      font-family: 'JetBrains Mono', monospace; line-height: 1.6;
    }
    .error-box {
      color: #888; font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; margin: 1rem 0; padding: 1rem;
      background: rgba(239,68,68,0.05);
      border: 1px solid rgba(239,68,68,0.1);
      border-radius: 6px; word-break: break-all; text-align: left;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="logo">DeathLegion Panel</div>
    <div class="subtitle" id="subtitle">Checking panel status...</div>
    <div id="content"><div class="spinner"></div></div>
  </div>
  <script>
    let pollInterval = null;
    let countdown = 10;
    let healStep = 0;
    const healSteps = [
      'Detecting panel failure',
      'Starting MySQL database',
      'Starting Redis cache',
      'Starting PHP application server',
      'Starting nginx reverse proxy',
      'Starting Wings daemon',
      'Verifying panel health',
      'Panel restored — redirecting'
    ];

    function render(state, data) {
      const app = document.getElementById('app');
      const subtitle = document.getElementById('subtitle');
      const content = document.getElementById('content');
      app.className = 'container ' + state;

      if (state === 'healthy') {
        subtitle.textContent = 'Panel is online';
        content.innerHTML =
          '<div class="spinner"></div>' +
          '<div class="status-text">Loading panel...</div>' +
          '<div class="msg">Response time: ' + ((data.panel && data.panel.response_time_ms) || '?') + 'ms</div>';
        setTimeout(function() { window.location.href = '/auth/login'; }, 800);
      } else if (state === 'healing') {
        subtitle.textContent = 'Self-healing system is restoring the panel';
        var stepsHtml = healSteps.map(function(s, i) {
          var cls = '';
          if (i < healStep) cls = 'done';
          else if (i === healStep) cls = 'active';
          return '<div class="step ' + cls + '"><span class="dot"></span><span>' + s + '</span></div>';
        }).join('');
        var lastRun = (data.self_heal && data.self_heal.last_run)
          ? new Date(data.self_heal.last_run).toLocaleString() : 'unknown';
        var healStatus = (data.self_heal && data.self_heal.status) || 'unknown';
        var runUrl = (data.self_heal && data.self_heal.last_run_url) || '#';
        content.innerHTML =
          '<div class="pulse">' +
            '<div class="spinner"></div>' +
            '<div class="status-text">Healing in Progress</div>' +
            '<div class="msg">The Pterodactyl panel is temporarily unavailable.<br>GitHub Actions self-healing is bringing it back online.<br>This usually takes 1-3 minutes.</div>' +
            '<div class="countdown">Next check in <strong>' + countdown + 's</strong></div>' +
          '</div>' +
          '<div class="steps">' + stepsHtml + '</div>' +
          '<div class="msg" style="margin-top:1rem;font-size:0.85rem;color:#666">' +
            'Self-heal status: <strong style="color:#f59e0b">' + healStatus + '</strong><br>' +
            'Last run: ' + lastRun + '<br>' +
            '<a href="' + runUrl + '" target="_blank" style="color:#bc6e3c">View GitHub Actions run →</a>' +
          '</div>';
      } else {
        subtitle.textContent = 'Unable to verify panel status';
        content.innerHTML =
          '<div class="status-text">Connection Error</div>' +
          '<div class="error-box">' + (data.error || 'Unknown error') + '</div>' +
          '<div class="countdown">Retrying in <strong>' + countdown + 's</strong></div>' +
          '<a href="/" class="manual-link">Retry now →</a>';
      }

      var meta = document.createElement('div');
      meta.className = 'meta';
      var panelInfo = data && data.panel
        ? 'Backend: ' + data.panel.status + ' (' + data.panel.http_code + ', ' + data.panel.response_time_ms + 'ms)'
        : 'Backend: no data';
      meta.innerHTML =
        'Last check: ' + new Date().toISOString() + '<br>' +
        panelInfo + '<br>' +
        'Self-heal: every 5 min via GitHub Actions';
      var oldMeta = app.querySelector('.meta');
      if (oldMeta) oldMeta.remove();
      app.appendChild(meta);
    }

    async function checkHealth() {
      try {
        const resp = await fetch('/api/health', { cache: 'no-store' });
        const data = await resp.json();
        if (data.status === 'healthy') {
          render('healthy', data);
          stopPolling();
          return;
        }
        countdown = 10;
        render('healing', data);
        startCountdown();
      } catch (e) {
        render('error', { error: e.message });
        countdown = 10;
        startCountdown();
      }
    }

    function startCountdown() {
      stopPolling();
      pollInterval = setInterval(function() {
        countdown--;
        if (countdown <= 0) {
          if (healStep < healSteps.length - 1) healStep++;
          checkHealth();
        } else {
          var cd = document.querySelector('.countdown strong');
          if (cd) cd.textContent = countdown + 's';
        }
      }, 1000);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    checkHealth();
  </script>
</body>
</html>
