# Local development stack: MySQL + Redis + the Laravel backend.
# The frontend runs on the host via `npm run dev` (Vite proxies /api to the backend).
# Reference: docs/10-LocalDevGuide.md

services:
  database:
    image: mysql:8.0
    container_name: pterodactyl-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pterodactyl
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: pterodactyl
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: pterodactyl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pterodactyl-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: Pterodactyl
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      FORCE_HTTPS: "false"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: "3306"
      DB_DATABASE: pterodactyl
      DB_USERNAME: pterodactyl
      DB_PASSWORD: pterodactyl
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      SESSION_DOMAIN: localhost
      SESSION_SAMESITE: lax
      SESSION_SECURE_COOKIE: "false"
      QUEUE_CONNECTION: redis
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:5173,127.0.0.1,127.0.0.1:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8000
      MAIL_MAILER: log
      RECAPTCHA_ENABLED: "false"
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/pterodactyl
      - /var/www/pterodactyl/vendor
    # Override entrypoint to skip production caching for dev
    entrypoint: ["php-fpm"]

  nginx:
    image: nginx:1.27-alpine
    container_name: pterodactyl-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/pterodactyl
      - ./scripts/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db-data:
  redis-data:
